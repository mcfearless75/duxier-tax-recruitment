<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
  :root{
    --ink:#0B1220;
    --paper:#F7F5F0;
    --paper-text:#14181F;
    --slate:#525B68;
    --brass:#AD8A54;
    --brass-bright:#C8A468;
    --redact:#12151C;
    --forest:#2F6F52;
    --serif:'Fraunces', Georgia, serif;
    --sans:'IBM Plex Sans', -apple-system, sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    width:1200px; height:630px;
    background:var(--ink);
    font-family:var(--sans);
    position:relative;
    overflow:hidden;
  }
  body::after{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(ellipse 900px 600px at 88% -8%, rgba(173,138,84,0.28), transparent 60%);
  }
  .stage{
    position:relative; z-index:1;
    display:flex; align-items:center; height:100%;
    padding:0 76px;
    gap:60px;
  }
  .copy{flex:1;}
  .eyebrow{
    font-family:var(--mono); font-size:15px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--brass); display:flex; align-items:center; gap:12px; margin-bottom:26px;
  }
  .eyebrow::before{content:""; width:28px; height:1px; background:var(--brass);}
  h1{
    font-family:var(--serif); font-weight:700; color:#fff; font-size:58px; line-height:1.08;
    letter-spacing:-0.01em; margin-bottom:22px;
  }
  h1 em{font-style:italic; color:var(--brass-bright);}
  p.lede{
    font-family:var(--sans); font-size:22px; color:#A9AFBC; max-width:30ch; line-height:1.4;
  }
  .card-wrap{width:420px; flex-shrink:0; position:relative; height:380px;}
  .doc-card{
    background:var(--paper); color:var(--paper-text); border-radius:8px;
    padding:30px 30px 26px; box-shadow:0 40px 80px -20px rgba(0,0,0,0.6);
    position:absolute; width:420px;
  }
  .doc-card.back{top:30px; left:26px; transform:rotate(4deg); opacity:0.5; filter:saturate(0.7);}
  .doc-card.front{top:0; left:0; transform:rotate(-2.5deg);}
  .doc-head{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding-bottom:16px; border-bottom:1px dashed rgba(11,18,32,0.15); margin-bottom:18px;
  }
  .doc-ref{font-family:var(--mono); font-size:13px; color:var(--slate); letter-spacing:0.04em;}
  .doc-stamp{
    font-family:var(--mono); font-size:12px; letter-spacing:0.1em; color:var(--forest);
    border:1px solid var(--forest); padding:4px 10px; border-radius:3px; text-transform:uppercase;
    transform:rotate(-4deg);
  }
  .doc-row{display:flex; gap:14px; align-items:center; margin-bottom:13px;}
  .doc-label{font-family:var(--mono); font-size:13px; color:var(--slate); width:88px; flex-shrink:0; text-transform:uppercase; letter-spacing:0.04em;}
  .doc-val{font-size:17px; font-weight:600;}
  .redact-bar{height:16px; background:var(--redact); border-radius:2px; display:inline-block;}
</style>
</head>
<body>
  <div class="stage">
    <div class="copy">
      <div class="eyebrow">Tax recruitment, without the agency</div>
      <h1>Firms don't need<br>another agency.<br>They need who's<br><em>already</em> looking.</h1>
      <p class="lede">No placement percentage. Identity hidden until you choose otherwise.</p>
    </div>
    <div class="card-wrap">
      <div class="doc-card back"></div>
      <div class="doc-card front">
        <div class="doc-head">
          <span class="doc-ref">REF DXR-4471</span>
          <span class="doc-stamp">Verified</span>
        </div>
        <div class="doc-row"><span class="doc-label">Role</span><span class="doc-val">Corporate Tax Manager</span></div>
        <div class="doc-row"><span class="doc-label">Quals</span><span class="doc-val">CTA, ACA</span></div>
        <div class="doc-row"><span class="doc-label">PQE</span><span class="doc-val">6–8 years</span></div>
        <div class="doc-row"><span class="doc-label">Employer</span><span class="redact-bar" style="width:170px"></span></div>
        <div class="doc-row"><span class="doc-label">Name</span><span class="redact-bar" style="width:125px"></span></div>
        <div class="doc-row"><span class="doc-label">Contact</span><span class="redact-bar" style="width:105px"></span></div>
      </div>
    </div>
  </div>
</body>
</html>
